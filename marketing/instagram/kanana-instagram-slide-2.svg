<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="124" y1="92" x2="944" y2="1250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DFF4FF"/>
      <stop offset="1" stop-color="#B2F0D2"/>
    </linearGradient>
    <linearGradient id="ring2" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F63BA8"/>
      <stop offset="1" stop-color="#FF7C69"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" rx="42" fill="url(#bg2)"/>
  <rect x="64" y="58" width="952" height="1234" rx="42" fill="#07111F"/>

  <rect x="116" y="102" width="848" height="210" rx="32" fill="#FFFFFF" fill-opacity="0.98"/>
  <image href="../brand/kanana-429-logo-horizontal.svg" x="150" y="138" width="780" height="111" preserveAspectRatio="xMinYMid meet"/>

  <text x="116" y="418" fill="#FFFFFF" font-size="82" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">왜 필요한가</text>
  <text x="116" y="514" fill="#D8E6F5" font-size="34" font-weight="500" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">대부분의 로컬 AI 프로젝트는 데모는 좋지만</text>
  <text x="116" y="560" fill="#D8E6F5" font-size="34" font-weight="500" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">반복 실행하면 문장, 포맷, 정확도가 흔들립니다</text>

  <rect x="116" y="618" width="848" height="168" rx="30" fill="#111827" stroke="#334155" stroke-width="3"/>
  <text x="160" y="684" fill="#FFFFFF" font-size="42" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">문제</text>
  <text x="160" y="742" fill="#CBD5E1" font-size="30" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">한 번은 잘 나오지만, 다음 호출에서 쉽게 무너진다</text>

  <rect x="116" y="834" width="848" height="304" rx="30" fill="#F8FAFC"/>
  <text x="160" y="902" fill="#111827" font-size="42" font-weight="800" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">Kanana 방식</text>
  <text x="160" y="970" fill="#0F172A" font-size="30" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">1. 구조화 JSON 생성 우선</text>
  <text x="160" y="1022" fill="#0F172A" font-size="30" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">2. 실패하면 deterministic fallback</text>
  <text x="160" y="1074" fill="#0F172A" font-size="30" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">3. 오개념은 taxonomy로 추적</text>
  <text x="160" y="1126" fill="#0F172A" font-size="30" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">4. QA harness로 계속 점수화</text>

  <text x="116" y="1232" fill="#FFFFFF" font-size="34" font-weight="700" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">결론: 보기 좋은 AI가 아니라 교육용으로 버티는 AI</text>
</svg>
