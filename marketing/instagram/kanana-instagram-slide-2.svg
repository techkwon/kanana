  <text x="116" y="546" fill="#D8E6F5" font-size="34" font-weight="500" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">반복 실행하면 문장, 포맷, 정확도가 흔들립니다</text>

  <rect x="116" y="618" width="848" height="168" rx="30" fill="#111827" stroke="#334155" stroke-width="3"/>
