  <text x="160" y="970" fill="#0F172A" font-size="30" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">1. 구조화 JSON 생성 우선</text>
  <text x="160" y="1022" fill="#0F172A" font-size="30" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">2. 실패하면 deterministic fallback</text>
  <text x="160" y="1074" fill="#0F172A" font-size="30" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">3. 오개념은 taxonomy로 추적</text>
